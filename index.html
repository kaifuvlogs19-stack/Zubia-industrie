<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zubia Industry | Handicrafts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:      #c8a96e;
    --gold-lt:   #e2c68a;
    --gold-dk:   #8a6a3a;
    --stone:     #0f172a;
    --stone-md:  #020617;
    --stone-lt:  #1e293b;
    --stone-card:#334155;
    --cream:     #f1f5f9;
    --cream-dk:  #cbd5e1;
    --text:      #cbd5e1;
    --green:     #22c55e;
    --radius:    4px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Poppins', 'Jost', sans-serif;
    font-weight: 300;
    background: var(--stone);
    color: var(--text);
    overflow-x: hidden;
    cursor: none;
  }

  /* ── Custom Cursor ── */
  .cursor {
    position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: transform .15s ease;
  }
  .cursor-ring {
    position: fixed; top: 0; left: 0;
    width: 36px; height: 36px;
    border: 1px solid var(--gold-lt);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 9998;
    transition: transform .35s cubic-bezier(.17,.67,.42,1.1), width .3s, height .3s;
    opacity: .6;
  }

  /* ── Noise Overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: .04;
  }

  /* ── Header ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 5vw;
    background: var(--stone-md);
    border-bottom: 1px solid rgba(200,169,110,.08);
    transition: box-shadow .4s, border-color .4s;
  }
  header.scrolled {
    box-shadow: 0 4px 32px rgba(0,0,0,.5);
    border-color: rgba(200,169,110,.2);
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 2.5vw, 1.6rem);
    font-weight: 400;
    letter-spacing: .12em;
    color: var(--gold-lt);
    text-transform: uppercase;
  }
  .logo span { font-style: italic; color: var(--gold); }

  nav { display: flex; gap: 2.5rem; }
  nav a {
    font-size: .78rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: white;
    text-decoration: none;
    position: relative;
    transition: color .3s;
  }
  nav a::after {
    content: ''; position: absolute; bottom: -3px; left: 0;
    width: 0; height: 1px; background: var(--gold);
    transition: width .35s cubic-bezier(.4,0,.2,1);
  }
  nav a:hover { color: var(--gold-lt); }
  nav a:hover::after { width: 100%; }

  /* ── Hero ── */
  .hero {
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
    padding: 8rem 5vw 4rem;
  }

    /* Cinematic hero with animated temple vibe */
  .hero-bg {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, #0a0f1e 0%, #020617 40%, #0d1a0a 100%);
    overflow: hidden;
  }
  /* Animated spotlight like temple light */
  .hero-bg::before {
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 55% 70% at 65% 40%, rgba(200,169,110,.13) 0%, transparent 65%),
      radial-gradient(ellipse 40% 50% at 20% 70%, rgba(34,197,94,.07) 0%, transparent 55%),
      radial-gradient(ellipse 30% 40% at 80% 80%, rgba(200,169,110,.06) 0%, transparent 50%);
    animation: heroLightShift 8s ease-in-out infinite alternate;
  }
  .hero-bg::after {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent, transparent 3px,
      rgba(200,169,110,.012) 3px, rgba(200,169,110,.012) 4px
    );
    pointer-events:none;
  }
  @keyframes heroLightShift {
    0%   { opacity:.7; transform:scale(1) translateX(0); }
    50%  { opacity:1;  transform:scale(1.05) translateX(-2%); }
    100% { opacity:.8; transform:scale(1.02) translateX(2%); }
  }
  /* Floating particles (temple lamps) */
  .hero-particles { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .particle {
    position:absolute; border-radius:50%;
    background: radial-gradient(circle, rgba(200,169,110,.6), transparent 70%);
    animation: particleFloat linear infinite;
  }

  /* Decorative lines */
  .hero-lines {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .hero-lines::before, .hero-lines::after {
    content: '';
    position: absolute;
    border: 1px solid rgba(200,169,110,.1);
    border-radius: 50%;
  }
  .hero-lines::before {
    width: 70vmin; height: 70vmin;
    top: 50%; left: 55%;
    transform: translate(-50%, -50%);
    animation: spinSlow 40s linear infinite;
  }
  .hero-lines::after {
    width: 50vmin; height: 50vmin;
    top: 50%; left: 55%;
    transform: translate(-50%, -50%);
    animation: spinSlow 25s linear infinite reverse;
    border-style: dashed;
  }
  @keyframes spinSlow { to { transform: translate(-50%, -50%) rotate(360deg); } }

  .hero-content {
    position: relative; z-index: 2;
    text-align: center;
    max-width: 780px;
  }

  .hero-eyebrow {
    font-size: .72rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp .8s ease .3s forwards;
  }

  .hero h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight: 300;
    line-height: 1.08;
    color: var(--cream);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp .9s ease .5s forwards;
  }
  .hero h2 em {
    font-style: italic; color: var(--gold-lt);
    display: block;
  }

  .hero-sub {
    font-size: .82rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(212,196,170,.6);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp .8s ease .7s forwards;
  }

  .hero-tags {
    display: flex; flex-wrap: wrap; gap: .75rem;
    justify-content: center; margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp .8s ease .85s forwards;
  }
  .tag {
    border: 1px solid rgba(200,169,110,.3);
    padding: .4rem 1rem;
    font-size: .7rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--gold);
    border-radius: 2px;
    background: rgba(200,169,110,.06);
    transition: all .3s;
  }
  .tag:hover { background: rgba(200,169,110,.15); border-color: var(--gold); }

  .btn-group { display: flex; gap: 1rem; justify-content: center;
    opacity: 0; animation: fadeUp .8s ease 1s forwards; }

  .btn {
    display: inline-block;
    padding: .9rem 2.5rem;
    font-size: .75rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: var(--radius);
    transition: all .35s cubic-bezier(.4,0,.2,1);
    font-family: 'Jost', sans-serif;
    font-weight: 400;
  }
  .btn-primary {
    background: var(--green);
    color: white;
    box-shadow: 0 4px 24px rgba(34,197,94,.3);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(34,197,94,.45);
    background: #16a34a;
  }
  .btn-outline {
    border: 1px solid rgba(200,169,110,.4);
    color: var(--gold-lt);
  }
  .btn-outline:hover {
    border-color: var(--gold);
    background: rgba(200,169,110,.08);
    transform: translateY(-2px);
  }

  .scroll-hint {
    position: absolute; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: .5rem;
    opacity: 0; animation: fadeIn 1s ease 1.4s forwards;
    z-index: 2;
  }
  .scroll-hint span { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(200,169,110,.5); }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease infinite;
  }
  @keyframes scrollPulse { 0%,100% { opacity: .3; transform: scaleY(.8); } 50% { opacity: 1; transform: scaleY(1); } }

  /* ── Section Shared ── */
  section { position: relative; z-index: 1; }

  .section-label {
    font-size: .68rem;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 300;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 1.2rem;
  }
  .section-title em { font-style: italic; color: var(--gold-lt); }
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(to right, var(--gold), transparent);
    margin-bottom: 2rem;
  }

  /* ── Products ── */
  #products {
    padding: 8rem 5vw;
    background: linear-gradient(180deg, var(--stone) 0%, var(--stone-md) 100%);
  }
  .products-header { max-width: 500px; margin-bottom: 5rem; }

  .products-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 2rem;
    padding-bottom: 3rem;
  }

  /* User's 3D card base */
  .card {
    width: 260px;
    min-height: 300px;
    background: var(--stone-lt);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    /* 3D transform support from user's CSS */
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(.4,0,.2,1), background 0.4s, box-shadow 0.4s;
    cursor: none;
    /* Start off-screen rotated for scroll reveal */
    transform: rotateY(25deg) rotateX(12deg) scale(0.95);
    opacity: 0;
  }
  /* Visible state set by scroll JS */
  .card.in-view {
    transform: rotateY(0deg) rotateX(0deg) scale(1);
    opacity: 1;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200,169,110,.07) 0%, transparent 60%);
    border-radius: 20px;
    opacity: 0;
    transition: opacity .4s;
  }
  /* User's hover: rotateY + scale + lighter bg */
  .card:hover {
    transform: rotateY(20deg) rotateX(10deg) scale(1.05) !important;
    background: var(--stone-card);
    box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 0 1px rgba(200,169,110,.12);
  }
  .card:hover::before { opacity: 1; }

  .card-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 5rem;
    font-weight: 300;
    color: rgba(200,169,110,.08);
    position: absolute;
    top: 1rem; right: 1.5rem;
    line-height: 1;
    transition: color .4s;
  }
  .card:hover .card-number { color: rgba(200,169,110,.18); }

  .card-icon {
    font-size: 2.2rem;
    margin-bottom: 1.2rem;
    display: block;
  }
  .card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    color: var(--cream);
    margin-bottom: .6rem;
    transition: color .3s;
  }
  .card:hover h3 { color: var(--gold-lt); }
  .card p {
    font-size: .8rem;
    letter-spacing: .03em;
    line-height: 1.7;
    color: rgba(203,213,225,.6);
    max-width: 200px;
  }

  .card-arrow {
    position: absolute; bottom: 1.5rem; right: 1.5rem;
    width: 36px; height: 36px;
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-size: .9rem;
    opacity: 0;
    transform: translateY(4px);
    transition: all .3s;
  }
  .card:hover .card-arrow { opacity: 1; transform: translateY(0); }

  /* Featured card — full-width banner */
  .card.featured {
    width: 100%;
    max-width: 860px;
    min-height: auto;
    padding: 3.5rem;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--stone-lt) 0%, rgba(30,41,59,.8) 100%);
    display: flex; align-items: center; gap: 4rem;
    text-align: left;
    transform: rotateY(0deg) rotateX(0deg) scale(0.97);
    opacity: 0;
    transition: opacity .7s ease .3s, transform .7s ease .3s, background .4s, box-shadow .4s;
  }
  .card.featured.in-view { transform: scale(1); opacity: 1; }
  .card.featured:hover {
    transform: scale(1.02) !important;
    background: linear-gradient(135deg, var(--stone-card) 0%, rgba(51,65,85,.9) 100%);
  }
  .card.featured .card-text { flex: 1; }
  .card.featured .card-visual {
    flex: 0 0 240px;
    height: 160px;
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: rgba(200,169,110,.04);
  }
  .card.featured .card-visual::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(200,169,110,.06), transparent);
  }
  .card.featured .card-visual-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: .9rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
  }

  /* ── About ── */
  #about {
    padding: 9rem 5vw;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8rem;
    align-items: center;
    background: var(--stone-md);
    text-align: center;
  }
  .about-left { position: relative; }
  .about-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    max-height: 520px;
    background: linear-gradient(135deg, var(--stone-lt) 0%, rgba(30,41,59,.6) 100%);
    border: 1px solid rgba(200,169,110,.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    position: relative; overflow: hidden;
  }
  .about-img-placeholder::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    border: 1px solid rgba(200,169,110,.1);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }
  .craft-symbol {
    font-size: 3.5rem;
    position: relative; z-index: 1;
  }
  .about-img-label {
    font-size: .65rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
  }

  .about-badge {
    position: absolute;
    bottom: -1.5rem; right: -1.5rem;
    width: 120px; height: 120px;
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 50%;
    background: var(--stone);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 1rem;
  }
  .about-badge-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
  }
  .about-badge-text {
    font-size: .58rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: rgba(200,169,110,.6);
    margin-top: .25rem;
  }

  .about-right {}
  .about-right p {
    font-size: .92rem;
    line-height: 1.9;
    color: rgba(212,196,170,.7);
    margin-bottom: 1.5rem;
  }
  .about-stats {
    display: flex; gap: 3rem;
    margin-top: 3rem; padding-top: 2.5rem;
    border-top: 1px solid rgba(200,169,110,.12);
  }
  .stat {}
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: .68rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: rgba(212,196,170,.5);
    margin-top: .3rem;
  }

  /* ── Contact ── */
  #contact {
    padding: 9rem 5vw;
    background: var(--stone-md);
    text-align: center;
    position: relative; overflow: hidden;
  }
  #contact::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }
  .contact-content { position: relative; z-index: 1; max-width: 580px; margin: 0 auto; }
  .contact-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 6rem;
    font-weight: 300;
    color: rgba(200,169,110,.08);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    z-index: 0;
    pointer-events: none;
  }

  .contact-phone {
    display: inline-flex; align-items: center; gap: 1rem;
    margin: 2.5rem 0 3rem;
    padding: 1.5rem 3rem;
    border: 1px solid rgba(200,169,110,.25);
    border-radius: var(--radius);
    background: rgba(200,169,110,.05);
    text-decoration: none;
    transition: all .35s;
  }
  .contact-phone:hover {
    background: rgba(200,169,110,.1);
    border-color: var(--gold);
    transform: scale(1.02);
    box-shadow: 0 0 40px rgba(200,169,110,.15);
  }
  .phone-icon { font-size: 1.4rem; }
  .phone-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: .05em;
  }
  .contact-note {
    font-size: .72rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
  }

  .whatsapp-btn {
    display: inline-flex; align-items: center; gap: .75rem;
    margin-top: 1.5rem;
    padding: .85rem 2rem;
    background: rgba(37,211,102,.12);
    border: 1px solid rgba(37,211,102,.25);
    border-radius: var(--radius);
    color: #6fda9a;
    text-decoration: none;
    font-size: .75rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    transition: all .3s;
  }
  .whatsapp-btn:hover {
    background: rgba(37,211,102,.2);
    border-color: rgba(37,211,102,.5);
    transform: translateY(-2px);
  }

  /* ── Footer ── */
  footer {
    padding: 2.5rem 5vw;
    border-top: 1px solid rgba(200,169,110,.1);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
    background: rgba(20,15,10,.5);
  }
  footer p, footer span {
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(212,196,170,.35);
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .reveal {
    opacity: 0; transform: translateY(28px);
    transition: opacity .7s ease, transform .7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    nav { gap: 1.5rem; }
    nav a { font-size: .7rem; }
    .products-grid { grid-template-columns: 1fr; }
    .card.featured { flex-direction: column; gap: 2rem; }
    .card.featured .card-visual { flex: none; width: 100%; }
    #about { grid-template-columns: 1fr; gap: 4rem; }
    .about-badge { display: none; }
    .about-stats { gap: 2rem; }
    .phone-num { font-size: 1.7rem; }
    footer { justify-content: center; text-align: center; }
  }
  @media (max-width: 480px) {
    header { padding: 1.2rem 1.5rem; }
    nav { gap: 1rem; }
  }

  /* ── Real Product Images ── */
  .card-img {
    width: 100%; height: 200px;
    object-fit: cover;
    border-radius: 12px 12px 0 0;
    display: block;
    transition: transform .6s cubic-bezier(.4,0,.2,1), filter .4s;
    filter: brightness(.85) saturate(1.1);
  }
  .card:hover .card-img {
    transform: scale(1.07);
    filter: brightness(1) s
